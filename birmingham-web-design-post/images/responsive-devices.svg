<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="The same Birmingham business website shown responsively on a desktop monitor, tablet, and smartphone">
  <defs>
    <linearGradient id="d-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16263F"/>
      <stop offset="1" stop-color="#0F1B2D"/>
    </linearGradient>
    <linearGradient id="d-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4C77B"/>
      <stop offset="1" stop-color="#C8A24A"/>
    </linearGradient>
    <linearGradient id="d-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2EEE3"/>
    </linearGradient>
    <filter id="d-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#d-bg)"/>
  <text x="800" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#F7F4EC">Looks Perfect on Every Screen</text>
  <rect x="690" y="134" width="220" height="4" rx="2" fill="url(#d-gold)"/>

  <!-- desktop -->
  <g filter="url(#d-soft)">
    <rect x="300" y="220" width="640" height="400" rx="16" fill="#0A1422"/>
    <rect x="316" y="236" width="608" height="350" rx="6" fill="url(#d-screen)"/>
    <rect x="316" y="236" width="608" height="40" rx="6" fill="#0F1B2D"/>
    <circle cx="338" cy="256" r="6" fill="#E4736B"/><circle cx="358" cy="256" r="6" fill="#E4C77B"/><circle cx="378" cy="256" r="6" fill="#7BC49A"/>
    <rect x="346" y="300" width="180" height="16" rx="6" fill="#0F1B2D"/>
    <rect x="346" y="328" width="280" height="10" rx="5" fill="#9AA7B6"/>
    <rect x="346" y="348" width="240" height="10" rx="5" fill="#C4CCD6"/>
    <rect x="346" y="384" width="120" height="34" rx="8" fill="url(#d-gold)"/>
    <rect x="690" y="300" width="200" height="120" rx="10" fill="#16263F"/>
    <circle cx="730" cy="338" r="16" fill="url(#d-gold)"/>
    <rect x="346" y="448" width="170" height="100" rx="10" fill="#E7E1D2"/>
    <rect x="540" y="448" width="170" height="100" rx="10" fill="#E7E1D2"/>
    <rect x="734" y="448" width="156" height="100" rx="10" fill="#E7E1D2"/>
    <!-- stand -->
    <rect x="590" y="620" width="60" height="50" fill="#0A1422"/>
    <rect x="520" y="668" width="200" height="16" rx="8" fill="#0A1422"/>
  </g>

  <!-- tablet -->
  <g filter="url(#d-soft)" transform="translate(0,40)">
    <rect x="980" y="300" width="300" height="400" rx="22" fill="#0A1422"/>
    <rect x="996" y="332" width="268" height="336" rx="6" fill="url(#d-screen)"/>
    <rect x="996" y="332" width="268" height="30" rx="6" fill="#0F1B2D"/>
    <rect x="1018" y="384" width="120" height="14" rx="6" fill="#0F1B2D"/>
    <rect x="1018" y="408" width="200" height="9" rx="4" fill="#9AA7B6"/>
    <rect x="1018" y="426" width="170" height="9" rx="4" fill="#C4CCD6"/>
    <rect x="1018" y="456" width="100" height="30" rx="8" fill="url(#d-gold)"/>
    <rect x="1018" y="510" width="246" height="64" rx="10" fill="#16263F"/>
    <rect x="1018" y="588" width="118" height="64" rx="10" fill="#E7E1D2"/>
    <rect x="1146" y="588" width="118" height="64" rx="10" fill="#E7E1D2"/>
  </g>

  <!-- phone -->
  <g filter="url(#d-soft)" transform="translate(0,80)">
    <rect x="1320" y="360" width="170" height="340" rx="26" fill="#0A1422"/>
    <rect x="1334" y="386" width="142" height="288" rx="8" fill="url(#d-screen)"/>
    <rect x="1334" y="386" width="142" height="26" rx="8" fill="#0F1B2D"/>
    <circle cx="1405" cy="399" r="3" fill="#5B6B7F"/>
    <rect x="1350" y="430" width="90" height="12" rx="5" fill="#0F1B2D"/>
    <rect x="1350" y="452" width="110" height="7" rx="3" fill="#9AA7B6"/>
    <rect x="1350" y="466" width="96" height="7" rx="3" fill="#C4CCD6"/>
    <rect x="1350" y="488" width="80" height="24" rx="7" fill="url(#d-gold)"/>
    <rect x="1350" y="528" width="110" height="48" rx="8" fill="#16263F"/>
    <rect x="1350" y="588" width="110" height="48" rx="8" fill="#E7E1D2"/>
  </g>
</svg>
