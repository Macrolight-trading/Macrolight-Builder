<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="A modern website mockup in a browser window above a Birmingham, Michigan skyline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F1B2D"/>
      <stop offset="1" stop-color="#16263F"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4C77B"/>
      <stop offset="1" stop-color="#C8A24A"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2EEE3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.04">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600"/>
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900"/>
  </g>

  <!-- skyline silhouette -->
  <g fill="#0A1422" opacity="0.9">
    <rect x="120" y="640" width="90" height="220"/>
    <rect x="225" y="590" width="70" height="270"/>
    <rect x="310" y="660" width="60" height="200"/>
    <rect x="1230" y="610" width="80" height="250"/>
    <rect x="1325" y="560" width="64" height="300"/>
    <polygon points="1389,560 1357,520 1325,560"/>
    <rect x="1405" y="650" width="70" height="210"/>
  </g>

  <!-- browser window mockup -->
  <g filter="url(#soft)">
    <rect x="430" y="170" width="740" height="500" rx="18" fill="url(#screen)"/>
    <rect x="430" y="170" width="740" height="56" rx="18" fill="#0F1B2D"/>
    <rect x="430" y="208" width="740" height="18" fill="#0F1B2D"/>
    <circle cx="470" cy="198" r="8" fill="#E4736B"/>
    <circle cx="498" cy="198" r="8" fill="#E4C77B"/>
    <circle cx="526" cy="198" r="8" fill="#7BC49A"/>
    <rect x="600" y="186" width="420" height="24" rx="12" fill="#23344C"/>
    <text x="624" y="203" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#9FB2C8">yourbusiness-birmingham.com</text>

    <!-- page content -->
    <rect x="470" y="260" width="220" height="22" rx="6" fill="#0F1B2D"/>
    <rect x="470" y="296" width="360" height="14" rx="6" fill="#9AA7B6"/>
    <rect x="470" y="320" width="300" height="14" rx="6" fill="#C4CCD6"/>
    <rect x="470" y="366" width="170" height="46" rx="10" fill="url(#gold)"/>
    <text x="492" y="395" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#0F1B2D">Get a Quote</text>

    <rect x="900" y="262" width="230" height="150" rx="12" fill="#16263F"/>
    <circle cx="960" cy="312" r="22" fill="url(#gold)"/>
    <rect x="998" y="300" width="100" height="10" rx="5" fill="#9FB2C8"/>
    <rect x="998" y="320" width="70" height="10" rx="5" fill="#5B6B7F"/>
    <rect x="922" y="356" width="186" height="10" rx="5" fill="#3A4D66"/>
    <rect x="922" y="376" width="140" height="10" rx="5" fill="#3A4D66"/>

    <rect x="470" y="452" width="660" height="1" fill="#D9D2C2"/>
    <g fill="#16263F">
      <rect x="470" y="486" width="200" height="150" rx="12"/>
      <rect x="700" y="486" width="200" height="150" rx="12"/>
      <rect x="930" y="486" width="200" height="150" rx="12"/>
    </g>
    <g fill="url(#gold)">
      <circle cx="510" cy="528" r="16"/>
      <circle cx="740" cy="528" r="16"/>
      <circle cx="970" cy="528" r="16"/>
    </g>
    <g fill="#9FB2C8">
      <rect x="490" y="566" width="150" height="9" rx="4"/>
      <rect x="490" y="586" width="110" height="9" rx="4"/>
      <rect x="720" y="566" width="150" height="9" rx="4"/>
      <rect x="720" y="586" width="110" height="9" rx="4"/>
      <rect x="950" y="566" width="150" height="9" rx="4"/>
      <rect x="950" y="586" width="110" height="9" rx="4"/>
    </g>
  </g>

  <!-- location pill -->
  <g>
    <rect x="430" y="708" width="312" height="52" rx="26" fill="#16263F" stroke="#C8A24A" stroke-opacity="0.5"/>
    <circle cx="462" cy="734" r="9" fill="url(#gold)"/>
    <text x="486" y="740" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#F7F4EC">Built in Birmingham, Michigan</text>
  </g>

  <!-- accent badge -->
  <g transform="translate(1110,150)">
    <circle r="62" fill="url(#gold)"/>
    <text y="-6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="800" fill="#0F1B2D">100%</text>
    <text y="22" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0F1B2D">CUSTOM</text>
  </g>
</svg>
