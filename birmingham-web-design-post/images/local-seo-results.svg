<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="A growth chart and local search ranking dashboard showing increased traffic for a Birmingham business website">
  <defs>
    <linearGradient id="s-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F4EC"/>
      <stop offset="1" stop-color="#EDE7D8"/>
    </linearGradient>
    <linearGradient id="s-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4C77B"/>
      <stop offset="1" stop-color="#C8A24A"/>
    </linearGradient>
    <linearGradient id="s-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C8A24A" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C8A24A" stop-opacity="0"/>
    </linearGradient>
    <filter id="s-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0F1B2D" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#s-bg)"/>
  <text x="800" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#0F1B2D">Get Found by Birmingham Customers</text>
  <rect x="690" y="124" width="220" height="4" rx="2" fill="url(#s-gold)"/>

  <!-- chart card -->
  <g filter="url(#s-soft)">
    <rect x="150" y="190" width="860" height="540" rx="20" fill="#FFFFFF"/>
  </g>
  <text x="190" y="250" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#0F1B2D">Organic Traffic</text>
  <text x="190" y="280" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5B6B7F">After redesign &amp; local SEO</text>
  <text x="830" y="258" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="800" fill="#C8A24A">+212%</text>

  <!-- axes -->
  <line x1="210" y1="660" x2="960" y2="660" stroke="#D9D2C2" stroke-width="2"/>
  <line x1="210" y1="340" x2="210" y2="660" stroke="#D9D2C2" stroke-width="2"/>

  <!-- area + line -->
  <path d="M210 620 L330 600 L450 560 L570 520 L690 430 L810 360 L930 320 L930 660 L210 660 Z" fill="url(#s-fill)"/>
  <path d="M210 620 L330 600 L450 560 L570 520 L690 430 L810 360 L930 320" fill="none" stroke="url(#s-gold)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#C8A24A">
    <circle cx="210" cy="620" r="6"/><circle cx="330" cy="600" r="6"/><circle cx="450" cy="560" r="6"/>
    <circle cx="570" cy="520" r="6"/><circle cx="690" cy="430" r="6"/><circle cx="810" cy="360" r="6"/><circle cx="930" cy="320" r="7"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6B7F" text-anchor="middle">
    <text x="210" y="690">Jan</text><text x="330" y="690">Feb</text><text x="450" y="690">Mar</text>
    <text x="570" y="690">Apr</text><text x="690" y="690">May</text><text x="810" y="690">Jun</text><text x="930" y="690">Jul</text>
  </g>

  <!-- search ranking card -->
  <g filter="url(#s-soft)">
    <rect x="1050" y="190" width="400" height="540" rx="20" fill="#0F1B2D"/>
  </g>
  <text x="1080" y="250" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#F7F4EC">Google: "web design</text>
  <text x="1080" y="278" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#F7F4EC">birmingham mi"</text>

  <!-- result rows -->
  <g font-family="Helvetica, Arial, sans-serif">
    <g transform="translate(1080,310)">
      <rect width="340" height="64" rx="10" fill="url(#s-gold)"/>
      <text x="20" y="30" font-size="16" font-weight="800" fill="#0F1B2D">#1  Your Business</text>
      <text x="20" y="50" font-size="13" fill="#3A2F12">yourbusiness-birmingham.com</text>
    </g>
    <g transform="translate(1080,388)" fill="#9FB2C8">
      <rect width="340" height="50" rx="10" fill="#16263F"/>
      <text x="20" y="31" font-size="15">#2  competitor-one.com</text>
    </g>
    <g transform="translate(1080,450)" fill="#9FB2C8">
      <rect width="340" height="50" rx="10" fill="#16263F"/>
      <text x="20" y="31" font-size="15">#3  competitor-two.com</text>
    </g>
    <g transform="translate(1080,512)" fill="#9FB2C8">
      <rect width="340" height="50" rx="10" fill="#16263F"/>
      <text x="20" y="31" font-size="15">#4  directory-listing.com</text>
    </g>
  </g>
  <!-- map pin -->
  <g transform="translate(1250,610)">
    <path d="M0 90 C-36 40 -36 8 0 -10 C36 8 36 40 0 90 Z" fill="url(#s-gold)"/>
    <circle cx="0" cy="22" r="16" fill="#0F1B2D"/>
  </g>
</svg>
