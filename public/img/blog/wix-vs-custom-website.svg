  <text x="126" y="476" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">• Lower setup friction</text>
  <text x="126" y="504" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">• Fine for brochure-style sites</text>

