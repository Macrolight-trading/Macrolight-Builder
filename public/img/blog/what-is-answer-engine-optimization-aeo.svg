<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Search results narrowing into a highlighted answer card, local map signal, and booked leads for a local business">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="violetCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glowViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="230" cy="150" rx="260" ry="180" fill="url(#glowViolet)"/>
  <ellipse cx="980" cy="500" rx="290" ry="180" fill="url(#glowCyan)"/>

  <g transform="translate(60,56)">
    <rect x="0" y="0" width="92" height="32" rx="16" fill="#111113" stroke="#23232a"/>
    <circle cx="16" cy="16" r="4" fill="#fbbf24"/>
    <text x="28" y="21" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#ffffff">AEO</text>
  </g>

  <text x="60" y="150" font-family="'Playfair Display', Georgia, serif" font-size="54" font-weight="700" fill="#ffffff">Be the answer.</text>
  <text x="60" y="188" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.72)">Not just another result on the page.</text>

  <g transform="translate(72,240)">
    <rect x="0" y="0" width="350" height="238" rx="22" fill="#111113" stroke="#23232a"/>
    <rect x="28" y="28" width="200" height="14" rx="7" fill="rgba(255,255,255,0.16)"/>
    <rect x="28" y="60" width="280" height="56" rx="14" fill="#17171d" stroke="#262632"/>
    <circle cx="54" cy="88" r="10" fill="#7c3aed" opacity="0.95"/>
    <rect x="76" y="76" width="150" height="8" rx="4" fill="rgba(255,255,255,0.24)"/>
    <rect x="76" y="92" width="96" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
    <rect x="28" y="136" width="280" height="56" rx="14" fill="#17171d" stroke="#262632"/>
    <circle cx="54" cy="164" r="10" fill="#06b6d4" opacity="0.95"/>
    <rect x="76" y="152" width="170" height="8" rx="4" fill="rgba(255,255,255,0.24)"/>
    <rect x="76" y="168" width="116" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
    <rect x="28" y="212" width="230" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>

    <g transform="translate(270,186)">
      <circle cx="24" cy="24" r="24" fill="url(#gold)" filter="url(#soft)" opacity="0.85"/>
      <circle cx="24" cy="24" r="20" fill="#fbbf24"/>
      <path d="M16 24 L22 30 L34 18" stroke="#111113" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g fill="none" stroke="url(#violetCyan)" stroke-linecap="round">
    <path d="M438 357 C 515 357, 540 315, 598 315" stroke-width="4"/>
    <path d="M438 357 C 515 357, 540 315, 598 315" stroke-width="14" opacity="0.16" filter="url(#soft)"/>
  </g>
  <polygon points="595,306 615,315 595,324" fill="#06b6d4"/>

  <g transform="translate(620,160)">
    <rect x="0" y="0" width="520" height="320" rx="26" fill="#111113" stroke="#262632"/>
    <rect x="26" y="26" width="136" height="28" rx="14" fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.45)"/>
    <text x="94" y="44" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="700" fill="#d8b4fe" letter-spacing="1.5">ANSWER CARD</text>

    <rect x="30" y="78" width="280" height="188" rx="18" fill="#17171d" stroke="#2b2b38"/>
    <text x="52" y="114" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="13" font-weight="800" fill="#67e8f9" letter-spacing="1.4">QUESTION</text>
    <text x="52" y="144" font-family="'Playfair Display', Georgia, serif" font-size="28" fill="#ffffff">What is AEO?</text>
    <text x="52" y="184" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.82)">Clear answers engines can trust,</text>
    <text x="52" y="210" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.82)">summarize, and connect to your</text>
    <text x="52" y="236" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.82)">local business.</text>

    <g transform="translate(340,84)">
      <rect x="0" y="0" width="150" height="110" rx="18" fill="#17171d" stroke="#2b2b38"/>
      <text x="22" y="26" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#fbbf24" letter-spacing="1.8">LOCAL MATCH</text>
      <path d="M44 64 C44 49, 56 38, 75 38 C94 38, 106 49, 106 64 C106 87, 75 96, 75 96 C75 96, 44 87, 44 64 Z" fill="url(#violetCyan)"/>
      <circle cx="75" cy="62" r="10" fill="#ffffff" opacity="0.96"/>
      <text x="75" y="92" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Detroit</text>
    </g>

    <g transform="translate(340,210)">
      <rect x="0" y="0" width="150" height="78" rx="18" fill="#17171d" stroke="#2b2b38"/>
      <text x="24" y="26" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#67e8f9" letter-spacing="1.8">NEXT STEP</text>
      <rect x="24" y="40" width="102" height="22" rx="11" fill="url(#gold)"/>
      <text x="75" y="55" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#111113">FREE AUDIT</text>
    </g>
  </g>

  <text x="60" y="556" font-family="'Playfair Display', Georgia, serif" font-size="26" font-style="italic" fill="#ffffff" opacity="0.92">Clarity ranks. Clarity converts.</text>
  <text x="60" y="588" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.62)">Answer the question first, and the right customers are more likely to choose you.</text>
</svg>
