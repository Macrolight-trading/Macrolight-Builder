<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A flat business card on the left contrasted with a vibrant funnel and growth chart on the right">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <linearGradient id="violetCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="vividLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="dullCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#222228"/>
    </linearGradient>
    <linearGradient id="vividPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15151a"/>
      <stop offset="100%" stop-color="#0d0d10"/>
    </linearGradient>
    <radialGradient id="glowVio" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCy" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Soft glows behind the dynamic side -->
  <ellipse cx="900" cy="180" rx="280" ry="180" fill="url(#glowVio)"/>
  <ellipse cx="1020" cy="470" rx="260" ry="160" fill="url(#glowCy)"/>

  <!-- Eyebrow tag -->
  <g transform="translate(60,56)">
    <rect x="0" y="0" width="118" height="32" rx="16" fill="#111113" stroke="#1f1f23"/>
    <circle cx="16" cy="16" r="4" fill="#7c3aed"/>
    <text x="28" y="21" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#ffffff">STRATEGY</text>
  </g>

  <!-- LEFT: Static business card (dull) -->
  <g transform="translate(90,200)">
    <!-- card shadow -->
    <rect x="14" y="20" width="380" height="220" rx="16" fill="#000" opacity="0.5" filter="url(#soft)"/>
    <!-- card body -->
    <rect x="0" y="0" width="380" height="220" rx="16" fill="url(#dullCard)" stroke="#1f1f23"/>
    <!-- corner accent -->
    <rect x="0" y="0" width="380" height="6" rx="3" fill="#3a3a44"/>
    <!-- logo dot -->
    <circle cx="40" cy="48" r="14" fill="#3a3a44"/>
    <rect x="62" y="40" width="90" height="8" rx="4" fill="#3a3a44"/>
    <rect x="62" y="54" width="60" height="6" rx="3" fill="#2c2c34"/>
    <!-- name lines -->
    <rect x="28" y="110" width="180" height="10" rx="5" fill="#4a4a55"/>
    <rect x="28" y="130" width="120" height="8" rx="4" fill="#33333c"/>
    <!-- contact lines -->
    <rect x="28" y="170" width="140" height="6" rx="3" fill="#2c2c34"/>
    <rect x="28" y="184" width="170" height="6" rx="3" fill="#2c2c34"/>
    <rect x="28" y="198" width="100" height="6" rx="3" fill="#2c2c34"/>
    <!-- second card peeking behind -->
  </g>

  <!-- Connector arrow from card to dynamic side -->
  <g stroke="url(#vividLine)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M495 310 C 555 310, 575 310, 615 310" stroke-dasharray="2 8"/>
  </g>
  <polygon points="615,303 632,310 615,317" fill="#06b6d4"/>

  <!-- RIGHT: Dynamic side - funnel + growth -->
  <g transform="translate(640,150)">
    <!-- panel -->
    <rect x="0" y="0" width="500" height="340" rx="20" fill="url(#vividPanel)" stroke="#1f1f23"/>

    <!-- header pills -->
    <g transform="translate(24,24)">
      <rect x="0" y="0" width="74" height="22" rx="11" fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.45)"/>
      <text x="37" y="15" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="700" fill="#c4b5fd" letter-spacing="1.2">VISITS</text>
      <rect x="84" y="0" width="74" height="22" rx="11" fill="rgba(6,182,212,0.18)" stroke="rgba(6,182,212,0.45)"/>
      <text x="121" y="15" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="700" fill="#67e8f9" letter-spacing="1.2">LEADS</text>
    </g>

    <!-- Funnel -->
    <g transform="translate(40,80)">
      <rect x="0" y="0" width="200" height="34" rx="8" fill="rgba(124,58,237,0.85)"/>
      <rect x="22" y="50" width="156" height="34" rx="8" fill="rgba(168,85,247,0.85)"/>
      <rect x="48" y="100" width="104" height="34" rx="8" fill="rgba(217,70,239,0.85)"/>
      <rect x="72" y="150" width="56" height="34" rx="8" fill="rgba(6,182,212,0.95)"/>

      <text x="100" y="22" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">TRAFFIC</text>
      <text x="100" y="72" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">ENGAGE</text>
      <text x="100" y="122" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">CONVERT</text>
      <text x="100" y="172" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="800" fill="#ffffff" letter-spacing="1">CLIENT</text>
    </g>

    <!-- Growth chart -->
    <g transform="translate(280,80)">
      <!-- axis grid -->
      <g stroke="#1f1f23" stroke-width="1">
        <line x1="0" y1="180" x2="190" y2="180"/>
        <line x1="0" y1="135" x2="190" y2="135" stroke-dasharray="2 4"/>
        <line x1="0" y1="90" x2="190" y2="90" stroke-dasharray="2 4"/>
        <line x1="0" y1="45" x2="190" y2="45" stroke-dasharray="2 4"/>
      </g>
      <!-- area under curve -->
      <path d="M0 165 C 30 160, 55 150, 75 130 S 120 80, 150 50 L 190 25 L 190 180 L 0 180 Z"
            fill="url(#violetCyan)" opacity="0.18"/>
      <!-- curve -->
      <path d="M0 165 C 30 160, 55 150, 75 130 S 120 80, 150 50 L 190 25"
            fill="none" stroke="url(#vividLine)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- data points -->
      <circle cx="0" cy="165" r="4" fill="#7c3aed"/>
      <circle cx="75" cy="130" r="4" fill="#a855f7"/>
      <circle cx="150" cy="50" r="4" fill="#06b6d4"/>
      <circle cx="190" cy="25" r="5" fill="#06b6d4" stroke="#0a0a0a" stroke-width="2"/>
      <!-- end label -->
      <g transform="translate(140,-10)">
        <rect x="0" y="0" width="56" height="22" rx="11" fill="#06b6d4"/>
        <text x="28" y="15" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="800" fill="#0a0a0a">+312%</text>
      </g>
    </g>
  </g>

  <!-- Bottom caption: a quiet display-serif tagline -->
  <text x="60" y="560" font-family="'Playfair Display', Georgia, serif" font-style="italic" font-size="26" fill="#ffffff" opacity="0.92">More than a card.</text>
  <text x="60" y="592" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" letter-spacing="0.5">A system that turns visits into customers.</text>
</svg>
