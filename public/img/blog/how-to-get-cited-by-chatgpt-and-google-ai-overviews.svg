<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Checklist graphic showing how a local business can earn citations in ChatGPT and Google AI Overviews with clear answers, local proof, and indexed pages">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="violetCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glowViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="220" cy="160" rx="250" ry="180" fill="url(#glowViolet)"/>
  <ellipse cx="980" cy="490" rx="280" ry="190" fill="url(#glowCyan)"/>

  <g transform="translate(60,56)">
    <rect x="0" y="0" width="188" height="34" rx="17" fill="#111113" stroke="#23232a"/>
    <circle cx="18" cy="17" r="4" fill="#fbbf24"/>
    <text x="34" y="22" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8" fill="#ffffff">AI SEARCH PLAYBOOK</text>
  </g>

  <text x="60" y="146" font-family="'Playfair Display', Georgia, serif" font-size="50" font-weight="700" fill="#ffffff">Earn better AI citations.</text>
  <text x="60" y="182" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.74)">Clear answers, local proof, and pages worth citing.</text>

  <g transform="translate(64,232)">
    <rect x="0" y="0" width="418" height="292" rx="26" fill="#111113" stroke="#262632"/>
    <text x="28" y="42" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="13" font-weight="800" fill="#d8b4fe" letter-spacing="1.8">CITATION CHECKLIST</text>

    <g transform="translate(28,72)">
      <circle cx="16" cy="16" r="16" fill="url(#gold)"/>
      <path d="M9 16 L14 21 L24 11" stroke="#111113" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="21" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="#ffffff">Answer the question in the first paragraph</text>
    </g>

    <g transform="translate(28,126)">
      <circle cx="16" cy="16" r="16" fill="url(#gold)"/>
      <path d="M9 16 L14 21 L24 11" stroke="#111113" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="21" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="#ffffff">Show city, service, and real local proof</text>
    </g>

    <g transform="translate(28,180)">
      <circle cx="16" cy="16" r="16" fill="url(#gold)"/>
      <path d="M9 16 L14 21 L24 11" stroke="#111113" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="21" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="#ffffff">Use FAQs, comparisons, and cost framing</text>
    </g>

    <g transform="translate(28,234)">
      <circle cx="16" cy="16" r="16" fill="url(#gold)"/>
      <path d="M9 16 L14 21 L24 11" stroke="#111113" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="21" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="#ffffff">Keep the page indexed and easy to trust</text>
    </g>
  </g>

  <g transform="translate(540,166)">
    <rect x="0" y="0" width="600" height="342" rx="28" fill="#111113" stroke="#262632"/>
    <rect x="28" y="28" width="164" height="30" rx="15" fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.4)"/>
    <text x="110" y="47" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="700" fill="#d8b4fe" letter-spacing="1.6">HOW AI SEES THE PAGE</text>

    <g transform="translate(34,82)">
