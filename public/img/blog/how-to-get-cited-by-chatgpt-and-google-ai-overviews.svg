      <text x="22" y="30" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="800" fill="#67e8f9" letter-spacing="1.6">QUESTION</text>
      <text x="22" y="66" font-family="'Playfair Display', Georgia, serif" font-size="26" fill="#ffffff">How do I show up in</text>
      <text x="22" y="98" font-family="'Playfair Display', Georgia, serif" font-size="26" fill="#ffffff">ChatGPT search?</text>
      <rect x="22" y="122" width="228" height="54" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
      <text x="38" y="146" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.86)">Direct answer</text>
      <text x="38" y="166" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.58)">+ local proof + trust</text>
      <rect x="22" y="190" width="112" height="18" rx="9" fill="url(#gold)"/>
      <text x="78" y="203" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="800" fill="#111113">FREE AUDIT CTA</text>
    </g>

    <g transform="translate(338,82)">
      <rect x="0" y="0" width="228" height="98" rx="20" fill="#17171d" stroke="#2b2b38"/>
      <text x="20" y="28" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#fbbf24" letter-spacing="1.8">LOCAL SIGNALS</text>
      <path d="M26 58 C26 44, 38 34, 54 34 C70 34, 82 44, 82 58 C82 78, 54 87, 54 87 C54 87, 26 78, 26 58 Z" fill="url(#violetCyan)"/>
      <circle cx="54" cy="56" r="8" fill="#ffffff" opacity="0.95"/>
      <text x="100" y="56" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" fill="#ffffff">Royal Oak • Troy • Birmingham</text>
      <text x="100" y="76" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.58)">Clear service area = easier local match</text>
    </g>

    <g transform="translate(338,196)">
      <rect x="0" y="0" width="228" height="106" rx="20" fill="#17171d" stroke="#2b2b38"/>
      <text x="20" y="28" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#67e8f9" letter-spacing="1.8">CITABLE FORMAT</text>
      <rect x="20" y="44" width="188" height="12" rx="6" fill="rgba(255,255,255,0.16)"/>
      <rect x="20" y="66" width="160" height="12" rx="6" fill="rgba(255,255,255,0.10)"/>
      <rect x="20" y="88" width="138" height="12" rx="6" fill="rgba(255,255,255,0.10)"/>
      <text x="138" y="95" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">FAQ + table + answer box</text>
    </g>
