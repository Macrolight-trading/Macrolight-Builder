  <text x="60" y="570" font-family="'Playfair Display', Georgia, serif" font-size="25" font-style="italic" fill="#ffffff" opacity="0.92">Make your site easier to retrieve, trust, and choose.</text>
  <text x="60" y="600" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.62)">SEO, AEO, and GEO work better when the page answers the commercial question before the user leaves.</text>
</svg>
