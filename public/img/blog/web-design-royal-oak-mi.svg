  <text x="96" y="196" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">Web design in Royal Oak, MI</text>
  <text x="96" y="256" fill="url(#gold)" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">built to earn local leads</text>
  <text x="96" y="312" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">Clear service pages, local relevance, visible reviews, and mobile-first CTAs.</text>

  <rect x="96" y="364" width="320" height="132" rx="24" fill="#0F172A" stroke="#334155"/>
  <text x="126" y="406" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Local visibility</text>
  <text x="126" y="442" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">Royal Oak + nearby city</text>
  <text x="126" y="470" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">signals tied to real services</text>
  <path d="M350 398C350 378 366 362 386 362C406 362 422 378 422 398C422 430 386 446 386 446C386 446 350 430 350 398Z" fill="url(#cyan)"/>
  <circle cx="386" cy="396" r="10" fill="#FFFFFF"/>

  <rect x="440" y="364" width="320" height="132" rx="24" fill="#0F172A" stroke="#334155"/>
  <text x="470" y="406" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Trust signals</text>
  <text x="470" y="442" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">Reviews, proof, guarantees,</text>
  <text x="470" y="470" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">and clear differentiation</text>
  <circle cx="706" cy="398" r="18" fill="#22C55E"/>
  <path d="M698 398L704 404L715 392" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="784" y="364" width="320" height="132" rx="24" fill="#0F172A" stroke="#334155"/>
  <text x="814" y="406" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Fast mobile CTA</text>
  <text x="814" y="442" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">Call, quote, or book</text>
  <text x="814" y="470" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">without extra friction</text>
  <rect x="980" y="388" width="88" height="42" rx="21" fill="url(#gold)"/>
  <text x="1024" y="415" text-anchor="middle" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">AUDIT</text>

  <rect x="850" y="118" width="226" height="162" rx="24" fill="#111827" stroke="#475569"/>
  <text x="880" y="160" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Checklist</text>
  <text x="880" y="198" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22">• Service clarity</text>
  <text x="880" y="230" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22">• Royal Oak relevance</text>
  <text x="880" y="262" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22">• Reviews near CTA</text>

  <text x="96" y="548" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18">Original Macrolight Builder asset for blog use only</text>
