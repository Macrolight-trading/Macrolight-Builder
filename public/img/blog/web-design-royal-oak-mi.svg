<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Royal Oak web design illustration showing local map visibility, trust signals, mobile conversion, and service-page structure">
  <rect width="1200" height="630" fill="#0B1120"/>
  <defs>
    <linearGradient id="gold" x1="76" y1="76" x2="1098" y2="562" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6D365"/>
      <stop offset="1" stop-color="#C8A24B"/>
    </linearGradient>
    <linearGradient id="panel" x1="72" y1="54" x2="1118" y2="576" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
