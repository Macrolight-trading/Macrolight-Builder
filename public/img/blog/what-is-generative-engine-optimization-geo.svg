<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Local business website transforming into AI citations, map relevance, and free audit conversion for generative engine optimization">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#15151b"/>
    </linearGradient>
    <linearGradient id="violetCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="250" cy="155" rx="270" ry="185" fill="url(#glowLeft)"/>
  <ellipse cx="965" cy="490" rx="300" ry="185" fill="url(#glowRight)"/>

  <g transform="translate(60,56)">
    <rect x="0" y="0" width="96" height="32" rx="16" fill="#111113" stroke="#23232a"/>
    <circle cx="16" cy="16" r="4" fill="#06b6d4"/>
    <text x="30" y="21" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#ffffff">GEO</text>
  </g>

  <text x="60" y="150" font-family="'Playfair Display', Georgia, serif" font-size="52" font-weight="700" fill="#ffffff">Be the cited source.</text>
  <text x="60" y="188" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.72)">Not just another page buried below the summary.</text>

  <g transform="translate(72,238)">
    <rect x="0" y="0" width="364" height="246" rx="24" fill="#111113" stroke="#262632"/>
    <text x="28" y="34" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="800" fill="#d8b4fe" letter-spacing="1.8">LOCAL BUSINESS PAGE</text>
    <rect x="28" y="52" width="196" height="12" rx="6" fill="rgba(255,255,255,0.15)"/>
    <rect x="28" y="82" width="308" height="64" rx="16" fill="#17171d" stroke="#2b2b38"/>
    <text x="48" y="108" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="800" fill="#67e8f9" letter-spacing="1.4">QUESTION</text>
    <text x="48" y="132" font-family="'Playfair Display', Georgia, serif" font-size="24" fill="#ffffff">What is GEO?</text>
    <rect x="28" y="164" width="140" height="50" rx="14" fill="#17171d" stroke="#2b2b38"/>
    <text x="48" y="186" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#fbbf24" letter-spacing="1.6">SERVICE</text>
    <text x="48" y="205" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" fill="#ffffff">Web design</text>
    <rect x="184" y="164" width="152" height="50" rx="14" fill="#17171d" stroke="#2b2b38"/>
    <text x="204" y="186" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#67e8f9" letter-spacing="1.6">MARKET</text>
    <text x="204" y="205" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" fill="#ffffff">Royal Oak, MI</text>
    <rect x="28" y="228" width="240" height="8" rx="4" fill="rgba(255,255,255,0.10)"/>
  </g>

  <g fill="none" stroke="url(#violetCyan)" stroke-linecap="round">
    <path d="M446 359 C 515 359, 545 315, 604 315" stroke-width="4"/>
    <path d="M446 359 C 515 359, 545 315, 604 315" stroke-width="14" opacity="0.16" filter="url(#soft)"/>
  </g>
  <polygon points="602,306 622,315 602,324" fill="#06b6d4"/>

  <g transform="translate(624,158)">
    <rect x="0" y="0" width="516" height="326" rx="26" fill="#111113" stroke="#262632"/>
    <rect x="26" y="26" width="164" height="28" rx="14" fill="rgba(6,182,212,0.16)" stroke="rgba(6,182,212,0.40)"/>
    <text x="108" y="44" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="700" fill="#a5f3fc" letter-spacing="1.4">AI CITATION VIEW</text>

    <rect x="30" y="78" width="286" height="192" rx="18" fill="#17171d" stroke="#2b2b38"/>
    <text x="52" y="110" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" font-weight="800" fill="#fbbf24" letter-spacing="1.6">SUMMARY</text>
    <text x="52" y="142" font-family="'Playfair Display', Georgia, serif" font-size="28" fill="#ffffff">GEO helps local sites</text>
    <text x="52" y="172" font-family="'Playfair Display', Georgia, serif" font-size="28" fill="#ffffff">be easier to cite.</text>
    <text x="52" y="206" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.82)">Clear answers, real proof, local</text>
    <text x="52" y="232" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.82)">relevance, and strong next steps.</text>

    <g transform="translate(340,84)">
      <rect x="0" y="0" width="150" height="110" rx="18" fill="#17171d" stroke="#2b2b38"/>
      <text x="24" y="26" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#d8b4fe" letter-spacing="1.6">LOCAL SIGNAL</text>
      <path d="M44 64 C44 49, 56 38, 75 38 C94 38, 106 49, 106 64 C106 87, 75 96, 75 96 C75 96, 44 87, 44 64 Z" fill="url(#violetCyan)"/>
      <circle cx="75" cy="62" r="10" fill="#ffffff" opacity="0.96"/>
      <text x="75" y="92" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Detroit</text>
    </g>

    <g transform="translate(340,212)">
      <rect x="0" y="0" width="150" height="78" rx="18" fill="#17171d" stroke="#2b2b38"/>
      <text x="22" y="26" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#67e8f9" letter-spacing="1.6">NEXT STEP</text>
      <rect x="24" y="40" width="102" height="22" rx="11" fill="url(#gold)"/>
      <text x="75" y="55" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="800" fill="#111113">FREE AUDIT</text>
    </g>
  </g>

  <text x="60" y="556" font-family="'Playfair Display', Georgia, serif" font-size="26" font-style="italic" fill="#ffffff" opacity="0.92">Specific pages earn better summaries.</text>
  <text x="60" y="588" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.62)">GEO works when your content is clear enough to rank, cite, and convert.</text>
</svg>
