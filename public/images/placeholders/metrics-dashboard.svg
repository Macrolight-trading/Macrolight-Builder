<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="Sample analytics dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fafafa"/><stop offset="1" stop-color="#f4f4f5"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7c3aed"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="960" height="520" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="960" height="40" fill="#e4e4e7"/>
  <circle cx="20" cy="20" r="5" fill="#f87171"/><circle cx="40" cy="20" r="5" fill="#fbbf24"/><circle cx="60" cy="20" r="5" fill="#4ade80"/>
  <text x="480" y="25" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#71717a">yourbusiness.com / dashboard</text>
  <g transform="translate(32 64)">
    <text font-family="ui-sans-serif" font-size="20" font-weight="700" fill="#18181b">Lead pipeline</text>
    <text y="32" font-family="ui-sans-serif" font-size="12" fill="#71717a">Last 7 days</text>
    <rect y="64" width="220" height="100" rx="8" fill="white" stroke="#e4e4e7"/>
    <text x="12" y="88" font-size="10" fill="#a1a1aa">LEADS</text>
    <text x="12" y="120" font-size="32" font-weight="800" fill="#18181b">42</text>
    <rect y="200" width="220" height="100" rx="8" fill="white" stroke="#e4e4e7"/>
    <text x="12" y="224" font-size="10" fill="#a1a1aa">CONVERSION</text>
    <text x="12" y="256" font-size="32" font-weight="800" fill="#10b981">8.4%</text>
  </g>
  <g transform="translate(300 64)">
    <rect x="0" y="0" width="600" height="300" rx="8" fill="white" stroke="#e4e4e7"/>
    <text x="16" y="32" font-size="12" fill="#52525b" font-weight="600">Leads by day</text>
    <g transform="translate(24 56)">
      <rect y="200" width="32" height="40" fill="url(#bar)" opacity="0.5" rx="2"/>
      <rect x="40" y="180" width="32" height="60" fill="url(#bar)" opacity="0.6" rx="2"/>
      <rect x="80" y="150" width="32" height="90" fill="url(#bar)" opacity="0.7" rx="2"/>
      <rect x="120" y="120" width="32" height="120" fill="url(#bar)" opacity="0.8" rx="2"/>
      <rect x="160" y="100" width="32" height="140" fill="url(#bar)" opacity="0.85" rx="2"/>
      <rect x="200" y="80" width="32" height="160" fill="url(#bar)" opacity="0.9" rx="2"/>
      <rect x="240" y="60" width="32" height="180" fill="url(#bar)" rx="2"/>
      <line x1="0" y1="240" x2="290" y2="240" stroke="#d4d4d8" stroke-width="1"/>
    </g>
  </g>
  <g transform="translate(32 400)">
    <rect width="888" height="88" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#c4b5fd"/>
    <text x="24" y="40" font-size="14" font-weight="600" fill="#3f3f46">Get your free conversion audit</text>
    <text x="24" y="60" font-size="11" fill="#71717a">We map your funnel in 20 points — no pitch, no pressure.</text>
    <rect x="720" y="24" width="140" height="40" rx="6" fill="url(#bar)"/>
    <text x="757" y="50" font-size="12" font-weight="700" fill="white">Request audit</text>
  </g>
</svg>
